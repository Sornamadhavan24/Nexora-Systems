<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You | Madhavan Tech</title>
<meta name="description" content="Thank you page for Madhavan Tech contact form submissions.">
<style>
:root {
    --text: #1f1a17;
    --muted: #675d55;
    --brand: #c95a2e;
    --accent: #205c52;
    --line: rgba(73, 51, 34, 0.14);
    --shadow: 0 22px 50px rgba(77, 49, 28, 0.14);
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 20px;
    font-family: Georgia, "Times New Roman", serif;
    color: var(--text);
    background:
        radial-gradient(circle at top left, rgba(201, 90, 46, 0.16), transparent 32%),
        radial-gradient(circle at 88% 12%, rgba(32, 92, 82, 0.12), transparent 24%),
        linear-gradient(180deg, #f5ede1 0%, #f9f4ee 45%, #f3ece3 100%);
}

.card {
    width: min(640px, 100%);
    padding: 42px 32px;
    border: 1px solid var(--line);
    border-radius: 28px;
    background: rgba(255, 250, 245, 0.92);
    box-shadow: var(--shadow);
    text-align: center;
}

.badge {
    display: inline-block;
    padding: 8px 14px;
    border-radius: 999px;
    background: rgba(201, 90, 46, 0.08);
    color: var(--brand);
    font-family: "Trebuchet MS", Arial, sans-serif;
    font-size: 0.82rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
}

h1 {
    margin: 18px 0 12px;
    font-size: clamp(2rem, 6vw, 3.2rem);
    line-height: 1;
}

p {
    margin: 0;
    font-family: "Trebuchet MS", Arial, sans-serif;
    color: var(--muted);
    line-height: 1.7;
}

.actions {
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 26px;
}

.btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 48px;
    padding: 0 20px;
    border-radius: 999px;
    text-decoration: none;
    font-family: "Trebuchet MS", Arial, sans-serif;
    font-size: 0.92rem;
}

.btn-primary {
    background: var(--brand);
    color: #fff8f1;
}

.btn-secondary {
    background: rgba(32, 92, 82, 0.08);
    color: var(--accent);
    border: 1px solid rgba(32, 92, 82, 0.18);
}

@media (max-width: 520px) {
    .card {
        padding: 30px 20px;
        border-radius: 22px;
    }

    .actions {
        flex-direction: column;
    }

    .btn {
        width: 100%;
    }
}
</style>
</head>
<body>
    <main class="card">
        <div class="badge">Message Sent</div>
        <h1>Thank you.</h1>
        <p>Your message has been received. We will get back to you soon.</p>
        <div class="actions">
            <a class="btn btn-primary" href="expo.html">Back to Home</a>
            <a class="btn btn-secondary" href="https://wa.me/91XXXXXXXXXX">Chat on WhatsApp</a>
        </div>
    </main>
</body>
</html>
